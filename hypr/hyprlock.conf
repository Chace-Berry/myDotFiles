general {
    disable_loading_bar   = true
    hide_cursor           = true
    grace                 = 0
    no_fade_in            = false
    no_fade_out           = false
    ignore_empty_input    = true
}

background {
    monitor    =
    path       = /home/chace-berry/Videos/wallpaper_static.png
    blur_passes = 3
    blur_size   = 7
    brightness  = 0.6
    contrast    = 0.9
    vibrancy    = 0.16
}

input-field {
    monitor        =
    size           = 280, 48
    outline_thickness = 2
    dots_size      = 0.28
    dots_spacing   = 0.18
    dots_center    = true
    outer_color    = rgba(30, 30, 46, 0.80)
    inner_color    = rgba(30, 30, 46, 0.70)
    font_color     = rgb(205, 214, 244)
    fade_on_empty  = true
    placeholder_text = <span font_desc="sans 11" foreground="##cdd6f480">Enter password…</span>
    check_color    = rgb(166, 227, 161)
    fail_color     = rgb(243, 139, 168)
    fail_text      = <span foreground="##f38ba8">$FAIL ($ATTEMPTS)</span>
    fail_transition = 300
    capslock_color = rgb(249, 226, 175)
    position       = 0, -80
    halign         = center
    valign         = center
}

label {
    monitor    =
    text       = cmd[update:1000] echo "<span font_desc='sans bold 56'>$(date +'%H:%M')</span>"
    color      = rgba(205, 214, 244, 0.95)
    font_size  = 56
    font_family = sans bold
    position   = 0, 160
    halign     = center
    valign     = center
    shadow_passes = 2
    shadow_size   = 4
}

label {
    monitor    =
    text       = cmd[update:60000] echo "<span font_desc='sans 16'>$(date +'%A, %B %-d')</span>"
    color      = rgba(205, 214, 244, 0.60)
    font_size  = 16
    font_family = sans
    position   = 0, 90
    halign     = center
    valign     = center
}

label {
    monitor    =
    text       = chace-berry
    color      = rgba(205, 214, 244, 0.45)
    font_size  = 13
    font_family = sans
    position   = 0, -140
    halign     = center
    valign     = center
}
