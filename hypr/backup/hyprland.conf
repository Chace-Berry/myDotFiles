# https://wiki.hypr.land/Configuring/

################
### PROGRAMS ###
################
$terminal = kitty
$fileManager = kitty -e yazi
$menu = hyprlauncher

#############
### MODULES ###
#############
source = ~/.config/hypr/modules/user_info.conf
source = ~/.config/hypr/modules/env.conf
source = ~/.config/hypr/modules/monitors.conf
source = ~/.config/hypr/modules/autostart.conf
source = ~/.config/hypr/modules/animations.conf
source = ~/.config/hypr/modules/keybinds.conf
source = ~/.config/hypr/modules/io.conf
source = ~/.config/hypr/modules/workspace.conf
source = ~/.config/hypr/themes/theme.conf
source = ~/.config/hypr/modules/xppentab.conf
source = ~/.config/hypr/modules/keyboard_switcher.conf
